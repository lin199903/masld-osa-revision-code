cohorts:
  train:
    id: GSE89632
    label: MASLD liver training cohort
    sample_col: Sample_ID
    group_col: Group
    positive_label: NAFLD
    control_label: Control
  external:
    id: GSE135251
    label: MASLD liver external cohort
    sample_col: Sample_ID
    group_col: Group
    positive_label: NAFLD
    control_label: Control
  discovery_batches:
    expression_cohort_ids:
      - GSE126848
      - GSE130970

ihs:
  genes:
    - BCL2A1
    - HK2
    - IL1B
    - PLAUR
    - SLC2A1
  definition: reviewer-boundary auxiliary marker score (not the manuscript primary locked 10-gene model output)

ml:
  candidate_gene_source: cross_disease_genes
  outer_folds: 5
  inner_folds: 5
  alpha_grid:
    - 0.0
    - 0.5
    - 1.0
  lambda_rule: lambda.1se
  probability_positive_label: NAFLD

negative_controls:
  candidate_gse:
    - accession: GSE28619
      disease: ALD_or_alcoholic_hepatitis
      title: Alcoholic hepatitis with healthy controls (primary ALD/AH negative control)
      priority: 1
      manual_subdir: GSE28619
      expected_case_labels:
        - alcoholic hepatitis
        - ah
        - alcoholic hepatitis severe
      expected_control_labels:
        - healthy control
        - healthy
        - control
      case_regex: '(alcoholic\\s*hepatitis|\\bah\\b|alcoholic\\s*liver)'
      control_regex: '(healthy|normal|control)'
    - accession: GSE103580
      disease: ALD_or_alcoholic_hepatitis
      title: Alcoholic liver disease / alcoholic hepatitis liver transcriptome (secondary ALD/AH negative control)
      priority: 2
      manual_subdir: GSE103580
      expected_case_labels:
        - alcoholic hepatitis
        - alcoholic liver disease
        - ald
        - ah
      expected_control_labels:
        - healthy control
        - healthy
        - control
      case_regex: '(alcoholic\\s*hepatitis|alcoholic\\s*liver\\s*disease|\\bald\\b|\\bah\\b)'
      control_regex: '(healthy|normal|control)'
  local_misannotated_series:
    - accession: GSE130970
      actual_annotation: NAFLD_liver_not_negative_control
    - accession: GSE135917
      actual_annotation: OSA_subcutaneous_fat_not_negative_control
    - accession: GSE75097
      actual_annotation: OSA_PBMC_not_negative_control

